name: Backfill Date Range

"on":
  workflow_dispatch:
    inputs:
      start_date:
        description: "Start date to backfill (YYYY-MM-DD)"
        required: true
        type: string
      end_date:
        description: "End date to backfill (YYYY-MM-DD)"
        required: true
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: digest-deploy
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.13"
  STATE_BRANCH: state
  STATE_FILE: state.sqlite
  OUTPUT_DIR: public
  CONFIG_DIR: tests/fixtures/config
  TIMEZONE: Asia/Taipei

jobs:
  backfill-range:
    name: Backfill Range Sequentially
    runs-on: ubuntu-latest

    steps:
      - name: Resolve date range
        id: resolve
        env:
          START_DATE: ${{ inputs.start_date }}
          END_DATE: ${{ inputs.end_date }}
        run: |
          if ! [[ "${START_DATE}" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "::error::Invalid start_date format: ${START_DATE} (expected YYYY-MM-DD)"
            exit 1
          fi

          if ! [[ "${END_DATE}" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "::error::Invalid end_date format: ${END_DATE} (expected YYYY-MM-DD)"
            exit 1
          fi

          export START_DATE END_DATE TIMEZONE
          python3 - <<'PY'
          from datetime import datetime, timedelta
          import math
          import os
          from pathlib import Path
          from zoneinfo import ZoneInfo

          start = datetime.strptime(os.environ["START_DATE"], "%Y-%m-%d")
          end = datetime.strptime(os.environ["END_DATE"], "%Y-%m-%d")
          tz = ZoneInfo(os.environ["TIMEZONE"])
          now_local = datetime.now(tz)
          today_local = now_local.replace(hour=0, minute=0, second=0, microsecond=0)

          if start > end:
              raise SystemExit("::error::start_date must be on or before end_date.")

          if end.date() > today_local.date():
              raise SystemExit("::error::end_date cannot be in the future.")

          start_local = start.replace(tzinfo=tz)
          lookback_hours = max(
              24,
              math.ceil((now_local - start_local).total_seconds() / 3600),
          )

          dates = []
          cursor = start
          while cursor <= end:
              dates.append(cursor.strftime("%Y-%m-%d"))
              cursor += timedelta(days=1)

          today_str = today_local.strftime("%Y-%m-%d")
          historical_dates = [date for date in dates if date != today_str]
          dates_file = Path(os.environ["RUNNER_TEMP"]) / "backfill-dates.txt"
          dates_file.write_text(
              "".join(f"{date}\n" for date in historical_dates),
              encoding="utf-8",
          )

          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as fh:
              print(f"start_date={os.environ['START_DATE']}", file=fh)
              print(f"end_date={os.environ['END_DATE']}", file=fh)
              print(f"today_local={today_str}", file=fh)
              print(f"lookback_hours={lookback_hours}", file=fh)
              print(f"dates_file={dates_file}", file=fh)
              print(f"historical_dates_count={len(historical_dates)}", file=fh)

          print(
              "::notice::Resolved range "
              f"{os.environ['START_DATE']}..{os.environ['END_DATE']} "
              f"(today={today_str}, lookback_hours={lookback_hours}, "
              f"historical_dates={len(historical_dates)})."
          )
          PY

      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 1

      - name: Restore state and archives from state branch
        id: restore-state
        run: |
          mkdir -p "${OUTPUT_DIR}/api" "${OUTPUT_DIR}/api/day" "${OUTPUT_DIR}/day"
          STATE_RESTORED=false

          if git fetch origin "${STATE_BRANCH}:${STATE_BRANCH}" 2>/dev/null; then
            echo "state_branch_exists=true" >> "$GITHUB_OUTPUT"

            for FILE in $(git ls-tree --name-only "${STATE_BRANCH}" day/ 2>/dev/null || true); do
              git show "${STATE_BRANCH}:${FILE}" > "${OUTPUT_DIR}/${FILE}" 2>/dev/null || true
            done

            for FILE in $(git ls-tree --name-only "${STATE_BRANCH}" api/day/ 2>/dev/null || true); do
              git show "${STATE_BRANCH}:${FILE}" > "${OUTPUT_DIR}/${FILE}" 2>/dev/null || true
            done

            if git cat-file -e "${STATE_BRANCH}:api/daily.json" 2>/dev/null; then
              git show "${STATE_BRANCH}:api/daily.json" > "${OUTPUT_DIR}/api/daily.json" 2>/dev/null || true
            fi

            for FILE in api/llm_scores.json api/translations_zh.json; do
              if git cat-file -e "${STATE_BRANCH}:${FILE}" 2>/dev/null; then
                git show "${STATE_BRANCH}:${FILE}" > "${OUTPUT_DIR}/${FILE}" 2>/dev/null || true
              fi
            done

            if git show "${STATE_BRANCH}:${STATE_FILE}" > "${STATE_FILE}" 2>/dev/null; then
              STATE_RESTORED=true
            fi
          else
            echo "state_branch_exists=false" >> "$GITHUB_OUTPUT"
          fi

          echo "state_restored=${STATE_RESTORED}" >> "$GITHUB_OUTPUT"

          if [ "${STATE_RESTORED}" = "true" ]; then
            echo "::notice::Restored state snapshot from ${STATE_BRANCH}."
          else
            echo "::notice::No persisted state snapshot found. Starting range backfill from a fresh state."
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Prime state for requested range
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          OPENREVIEW_TOKEN: ${{ secrets.OPENREVIEW_TOKEN }}
        run: |
          SEED_OUTPUT_DIR="${RUNNER_TEMP}/seed-output"
          mkdir -p "${SEED_OUTPUT_DIR}"

          uv run python main.py run \
            --config "${CONFIG_DIR}/sources.yaml" \
            --entities "${CONFIG_DIR}/entities.yaml" \
            --topics "${CONFIG_DIR}/topics.yaml" \
            --state "${STATE_FILE}" \
            --out "${SEED_OUTPUT_DIR}" \
            --tz "${TIMEZONE}" \
            --lookback "${{ steps.resolve.outputs.lookback_hours }}" \
            --no-translate \
            --json-logs

      - name: Backfill historical dates sequentially
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_REFRESH_TOKEN: ${{ secrets.GEMINI_REFRESH_TOKEN }}
          GEMINI_OAUTH_CLIENT_ID: ${{ secrets.GEMINI_OAUTH_CLIENT_ID }}
          GEMINI_OAUTH_CLIENT_SECRET: ${{ secrets.GEMINI_OAUTH_CLIENT_SECRET }}
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          OPENAI_REASONING_EFFORT: ${{ secrets.OPENAI_REASONING_EFFORT }}
          OPENAI_THINKING_TYPE: ${{ secrets.OPENAI_THINKING_TYPE }}
          OPENAI_MAX_TOKENS: ${{ secrets.OPENAI_MAX_TOKENS }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          DATES_FILE="${{ steps.resolve.outputs.dates_file }}"

          if [ ! -s "${DATES_FILE}" ]; then
            echo "::notice::No historical dates require backfill after the priming run."
            exit 0
          fi

          while IFS= read -r TARGET_DATE; do
            [ -n "${TARGET_DATE}" ] || continue
            echo "::group::Backfill ${TARGET_DATE}"
            uv run python main.py backfill \
              --config "${CONFIG_DIR}/sources.yaml" \
              --entities "${CONFIG_DIR}/entities.yaml" \
              --topics "${CONFIG_DIR}/topics.yaml" \
              --state "${STATE_FILE}" \
              --out "${OUTPUT_DIR}" \
              --tz "${TIMEZONE}" \
              --date "${TARGET_DATE}" \
              --overwrite-existing \
              --json-logs
            echo "::endgroup::"
          done < "${DATES_FILE}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Build Vue.js frontend
        run: |
          cd frontend
          pnpm install --frozen-lockfile
          pnpm run build-only

          cp dist/index.html "../${OUTPUT_DIR}/"
          cp dist/index.html "../${OUTPUT_DIR}/404.html"
          cp -r dist/assets "../${OUTPUT_DIR}/"

      - name: Prepare archive output
        run: |
          mkdir -p "${OUTPUT_DIR}/api/day" "${OUTPUT_DIR}/day"

          LATEST_DATE=$(find "${OUTPUT_DIR}/api/day" -maxdepth 1 -name "*.json" -printf "%f\n" | sed 's/\.json$//' | sort -r | head -n 1)
          if [ -z "${LATEST_DATE}" ]; then
            echo "::error::No day archive JSON files were generated."
            exit 1
          fi

          if [ ! -f "${OUTPUT_DIR}/api/daily.json" ]; then
            cp "${OUTPUT_DIR}/api/day/${LATEST_DATE}.json" "${OUTPUT_DIR}/api/daily.json"
          fi

          DATES=$(find "${OUTPUT_DIR}/api/day" -maxdepth 1 -name "*.json" -printf "%f\n" | sed 's/\.json$//' | sort -r)
          DATES_JSON=$(echo "${DATES}" | jq -R -s 'split("\n") | map(select(length > 0))')

          jq --argjson dates "${DATES_JSON}" '.archive_dates = $dates' \
            "${OUTPUT_DIR}/api/daily.json" > "${OUTPUT_DIR}/api/daily.json.tmp"
          mv "${OUTPUT_DIR}/api/daily.json.tmp" "${OUTPUT_DIR}/api/daily.json"

          for JSON_FILE in "${OUTPUT_DIR}/api/day/"*.json; do
            [ -f "${JSON_FILE}" ] || continue
            DATE=$(basename "${JSON_FILE}" .json)
            cp "${OUTPUT_DIR}/index.html" "${OUTPUT_DIR}/day/${DATE}.html"
          done

      - name: Upload state artifact
        uses: actions/upload-artifact@v4
        with:
          name: state-sqlite
          path: ${{ env.STATE_FILE }}
          retention-days: 1
          if-no-files-found: error

      - name: Upload day archives artifact (HTML)
        uses: actions/upload-artifact@v4
        with:
          name: day-archives-html
          path: ${{ env.OUTPUT_DIR }}/day/
          retention-days: 1
          if-no-files-found: error

      - name: Upload day archives artifact (JSON)
        uses: actions/upload-artifact@v4
        with:
          name: day-archives-json
          path: ${{ env.OUTPUT_DIR }}/api/day/
          retention-days: 1
          if-no-files-found: error

      - name: Upload daily.json artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-json
          path: |
            ${{ env.OUTPUT_DIR }}/api/daily.json
            ${{ env.OUTPUT_DIR }}/api/llm_scores.json
            ${{ env.OUTPUT_DIR }}/api/translations_zh.json
          retention-days: 1
          if-no-files-found: error

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.OUTPUT_DIR }}

  deploy-pages:
    name: Deploy to GitHub Pages
    needs: backfill-range
    if: success()
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  persist-state:
    name: Persist State to Branch
    needs: backfill-range
    if: success()
    runs-on: ubuntu-latest

    steps:
      - name: Download state artifact
        uses: actions/download-artifact@v4
        with:
          name: state-sqlite
          path: artifacts/

      - name: Download day archives artifact (HTML)
        uses: actions/download-artifact@v4
        with:
          name: day-archives-html
          path: artifacts/day/

      - name: Download day archives artifact (JSON)
        uses: actions/download-artifact@v4
        with:
          name: day-archives-json
          path: artifacts/api/day/

      - name: Download daily.json artifact
        uses: actions/download-artifact@v4
        with:
          name: daily-json
          path: artifacts/api/

      - name: Verify artifacts
        run: |
          if [ ! -f "artifacts/${STATE_FILE}" ]; then
            echo "::error::Missing artifacts/${STATE_FILE}"
            exit 1
          fi

      - name: Checkout state branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.STATE_BRANCH }}
          path: state-repo
          fetch-depth: 1
        continue-on-error: true

      - name: Initialize state branch if needed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd state-repo
          CURRENT_BRANCH=$(git branch --show-current 2>/dev/null || echo "")

          if [ "${CURRENT_BRANCH}" != "${STATE_BRANCH}" ]; then
            cd ..
            rm -rf state-repo
            mkdir -p state-repo
            cd state-repo
            git init
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
            git checkout --orphan "${STATE_BRANCH}"
          fi

      - name: Push state and archives
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd state-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          cp "../artifacts/${STATE_FILE}" "${STATE_FILE}"

          mkdir -p day api/day api
          cp -r ../artifacts/day/* day/ 2>/dev/null || true
          cp -r ../artifacts/api/day/* api/day/ 2>/dev/null || true
          cp ../artifacts/api/daily.json api/daily.json 2>/dev/null || true
          cp ../artifacts/api/llm_scores.json api/llm_scores.json 2>/dev/null || true
          cp ../artifacts/api/translations_zh.json api/translations_zh.json 2>/dev/null || true

          git add "${STATE_FILE}" day/ api/

          if git diff --cached --quiet; then
            echo "No state changes to persist"
            exit 0
          fi

          git commit -m "chore(state): backfill date range [skip ci]"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git push --force origin "HEAD:refs/heads/${STATE_BRANCH}"
